# League configuration
# --------------------
# Each top-level key is the internal league identifier used throughout
# the pipeline (fixture.league, CSV downloads, Odds API lookups,
# team name normalisation).
#
# Fields:
#   football_data_code  — league code on football-data.co.uk
#                         used to construct the CSV download URL:
#                         https://www.football-data.co.uk/mmz4281/{season}/{code}.csv
#   odds_api_key        — sport key on The Odds API
#                         used for fixture, odds, and results endpoints
#   active              — whether this league is included in pipeline runs
#                         set to false until team_names is populated from live data
#   team_names          — maps football-data.co.uk team names to The Odds API names
#                         the two sources use different conventions (e.g. "Man City"
#                         vs "Manchester City"). populate by watching WARNING logs
#                         for unmatched team names on first live run.
#                         leave as {} for inactive leagues.
#
# Adding a new league:
#   1. Add a block with active: false
#   2. Set active: true
#   3. Run the pipeline and watch for WARNING logs: "team not found in ratings"
#   4. Add each unmatched name to team_names
#   5. Re-run to confirm clean

PL:
  football_data_code: "E0"
  odds_api_key: "soccer_epl"
  active: false
  team_names:
    "Man United": "Manchester United"
    "Man City": "Manchester City"
    "Nott'm Forest": "Nottingham Forest"
    "Wolves": "Wolverhampton Wanderers"
    "Spurs": "Tottenham Hotspur"
    "Newcastle": "Newcastle United"
    "Brighton": "Brighton and Hove Albion"
    "Leicester": "Leicester City"
    "Leeds": "Leeds United"
    "Ipswich": "Ipswich Town"


# Market configuration
# --------------------
# Each top-level key is the internal market identifier used throughout
# the pipeline (OddsSnapshot.market, Signal.selection, picks table).
#
# Fields:
#   active              — whether this market is processed by the pipeline
#   odds_api_market_key — market key requested from The Odds API odds endpoint
#   odds_derivation     — how to build OddsSnapshot from the API response:
#                           "direct"       read selection odds straight from response
#                           "implied_sum"  compute odds by summing implied probabilities
#                                          of component outcomes (e.g. DC from h2h:
#                                          1X odds = 1 / (1/home_win + 1/draw))
#   evaluation_strategy — how to determine won/lost at settlement time:
#                           "ftr"    compare full-time result code (H/D/A) against
#                                    pipe-separated winning codes in wins_if
#                           "btts"   check whether both teams scored at full time
#                           "total"  sum specified result columns and compare against
#                                    a threshold using the specified operator
#   settlement_source   — where to fetch post-match result data:
#                           "api"    Odds API scores endpoint (returns goals, FTR)
#                           "csv"    football-data.co.uk CSV download
#                                    use for stats not in the scores endpoint
#                                    (e.g. cards: HY, AY, HR, AR columns)
#
# selections[].id       — internal identifier, flows through state and ledger
# selections[].label    — human-readable description
# selections[].wins_if  — outcome condition, format depends on evaluation_strategy:
#
#   ftr / btts markets  — string of pipe-separated result codes:
#                           "H | D"     wins on home win or draw
#                           "btts_yes"  wins when both teams scored
#
#   total markets       — dict with three required keys:
#                           columns:    list of result dict fields to sum
#                                       goals:  ["fthg", "ftag"]
#                                       cards:  ["hy", "ay", "hr", "ar"]
#                           operator:   comparison operator — > | >= | < | <= | ==
#                           threshold:  numeric value to compare the total against
#
# Adding a new market:
#   1. Add a block with active: false
#   2. Implement a ProbabilityCalculator for the evaluation_strategy if not yet present
#      (see betting/markets/probability.py)
#   3. Set active: true
#   4. Monitor picks and settlement for correctness before increasing stake

double_chance:
  active: true
  odds_api_market_key: "h2h"
  odds_derivation: "implied_sum"
  evaluation_strategy: "ftr"
  settlement_source: "api"
  selections:
    - id: "1X"
      label: "Home or Draw"
      wins_if: "H | D"
    - id: "12"
      label: "Home or Away"
      wins_if: "H | A"
    - id: "X2"
      label: "Draw or Away"
      wins_if: "D | A"

btts:
  active: false
  odds_api_market_key: "btts"
  odds_derivation: "direct"
  evaluation_strategy: "btts"
  settlement_source: "api"
  selections:
    - id: "yes"
      label: "Both Teams to Score"
      wins_if: "btts_yes"
    - id: "no"
      label: "Neither Team to Score"
      wins_if: "btts_no"

goals_over_under_25:
  active: true
  odds_api_market_key: "totals"
  odds_derivation: "direct"
  evaluation_strategy: "total"
  settlement_source: "api"
  selections:
    - id: "over_25"
      label: "Over 2.5 Goals"
      outcome_name: "Over"
      outcome_point: 2.5
      wins_if:
        columns: ["fthg", "ftag"]
        operator: ">"
        threshold: 2.5
    - id: "under_25"
      label: "Under 2.5 Goals"
      outcome_name: "Under"
      outcome_point: 2.5
      wins_if:
        columns: ["fthg", "ftag"]
        operator: "<="
        threshold: 2.5

cards_over_under_35:
  active: false
  odds_api_market_key: "player_cards"
  odds_derivation: "direct"
  evaluation_strategy: "total"
  settlement_source: "csv"
  selections:
    - id: "over_35"
      label: "Over 3.5 Cards"
      outcome_name: "Over"
      outcome_point: 3.5
      wins_if:
        columns: ["hy", "ay", "hr", "ar"]
        operator: ">"
        threshold: 3.5
    - id: "under_35"
      label: "Under 3.5 Cards"
      outcome_name: "Under"
      outcome_point: 3.5
      wins_if:
        columns: ["hy", "ay", "hr", "ar"]
        operator: "<="
        threshold: 3.5

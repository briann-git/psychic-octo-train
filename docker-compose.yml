services:
  scheduler:
    build: .
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/db:/data/db
      - ./data/csv_cache:/data/csv_cache
      - ./data/backups:/data/backups
      - ./data/logs:/data/logs
      - ./data/heartbeat:/data/heartbeat
      - ./services/betting:/app/betting
      - ./config:/app/config
    environment:
      DB_PATH: /data/db/ledger.db
      CSV_CACHE_DIR: /data/csv_cache

  backend:
    build:
      context: .
      dockerfile: services/Dockerfile.backend
    restart: always
    volumes:
      - ./data/db:/data/db
      - ./data/csv_cache:/data/csv_cache
      - ./data/logs:/data/logs:ro
      - ./data/heartbeat:/data/heartbeat:ro
      - ./services/betting:/app/betting
      - ./services/backend/app:/app/app
      - ./config:/app/config
    env_file:
      - .env
    environment:
      DB_PATH: /data/db/ledger.db
      BACKTEST_DB_PATH: /data/db/backtest.db
      CSV_CACHE_DIR: /data/csv_cache
    depends_on:
      - scheduler
    # Not exposed externally — only reachable by the frontend container
    expose:
      - "8080"

  frontend:
    build:
      context: ./services
      dockerfile: Dockerfile.frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

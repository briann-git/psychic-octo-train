version: "3.9"

services:
  scheduler:
    build: .
    restart: always
    env_file:
      - .env
    volumes:
      - ./data/db:/data/db
      - ./data/csv_cache:/data/csv_cache
      - ./data/backups:/data/backups
    environment:
      DB_PATH: /data/db/ledger.db
      CSV_CACHE_DIR: /data/csv_cache

  dashboard:
    build: ./dashboard
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./data/db:/data/db:ro
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      DB_PATH: /data/db/ledger.db
    depends_on:
      - scheduler
